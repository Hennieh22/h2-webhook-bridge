# ── Walk-forward state quality rules ─────────────────────────────────────────
# Applied during conviction scoring and briefing generation.
state_quality:
  high_conviction_pattern:
    # BULL_STRONG + BOS + OB + ABOVE liquidity = highest validated edge
    # These state patterns get a +0.10 conviction score bonus
    trend:     BULL
    momentum:  STRONG
    structure: BOS
    rsi:       OB
    liquidity: ABOVE
  pullback_neutral_max_conviction: A
  # PULLBACK_NEUTRAL states are systematically overfit — never promote to A+
  # even if all gates pass. Require 4/4 pillars to reach A only.
  pullback_neutral_conviction_cap: A
  min_stability_for_primary: 0.40   # states below this never fire signals
  min_oos_wr_for_primary:    0.50   # states with OOS WR < 50% never fire

